name: Bug Report
description: Report something broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in what you can — the more detail, the faster the fix.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `bun run memory retrieve "..."`
        2. Observe error in stdout
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - src/ (indexing & retrieval)
        - .github/ (sync workflow)
        - .memory/ (derived state)
        - MCP server
        - CLI
        - Docs
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Output of `git rev-parse --short HEAD`
      placeholder: e.g. 718740e
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any relevant error messages or logs.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Environment, OS, Bun version, or anything else relevant.
    validations:
      required: false
