name: Feature Request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe what you'd like and why. Remember this repo is scoped to FPF sync and retrieval — no app/UI/server features.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what becomes possible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Include API surface, CLI flags, or behavior changes.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - src/ (indexing & retrieval)
        - .github/ (sync workflow)
        - .memory/ (derived state)
        - MCP server
        - CLI
        - Docs
        - Cross-cutting
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're less suitable.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, or references.
    validations:
      required: false
