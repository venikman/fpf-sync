name: Pages Build

on:
  pull_request:
    paths:
      - '.github/scripts/render-report-site.ts'
      - '.github/workflows/pages-build.yml'
      - 'theme/**'
      - 'package.json'
      - 'reports/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - name: Render site
        run: bun run build
