name: FPF Sync

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fpf-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync upstream FPF repository into ./FPF
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          upstream_sha="$(bash .github/scripts/sync-fpf.sh)"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "Mirrored upstream ailev/FPF@$upstream_sha into ./FPF"

      - name: Rebuild committed memory
        shell: bash
        run: |
          set -euo pipefail
          bun run memory index

      - name: Verify committed memory artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f .memory/pageindex-state.json
          test -f .memory/pageindex-tree.json
          test -f .memory/fpf-branches.json
          test -f .memory/pageindex-content.jsonl
          echo "Verified committed memory artifacts under .memory/"

      - name: Detect sync changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          fpf_changed=false
          memory_changed=false

          if ! git diff --quiet --exit-code -- FPF; then
            fpf_changed=true
          fi

          if ! git diff --quiet --exit-code -- .memory; then
            memory_changed=true
          fi

          echo "fpf_changed=$fpf_changed" >> "$GITHUB_OUTPUT"
          echo "memory_changed=$memory_changed" >> "$GITHUB_OUTPUT"

          if [ "$fpf_changed" = false ] && [ "$memory_changed" = false ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No sync changes detected in FPF/ or .memory/."
            exit 0
          fi

          if [ "$fpf_changed" = true ]; then
            message="chore(sync): mirror ailev/FPF@${{ steps.sync.outputs.upstream_sha }}"
          else
            message="chore(memory): rebuild FPF pageindex for ailev/FPF@${{ steps.sync.outputs.upstream_sha }}"
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "message=$message" >> "$GITHUB_OUTPUT"

          echo "Detected changes:"
          echo "- FPF/: $fpf_changed"
          echo "- .memory/: $memory_changed"
          git diff --stat -- FPF .memory

      - name: Commit mirrored repo and derived memory
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FPF .memory
          git commit -m "${{ steps.detect.outputs.message }}"
          echo "Created commit: ${{ steps.detect.outputs.message }}"

      - name: Push directly to current branch
        if: steps.detect.outputs.changed == 'true'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"
