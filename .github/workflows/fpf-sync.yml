name: FPF Sync

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fpf-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync upstream FPF repository into ./FPF
        id: sync
        shell: bash
        run: |
          upstream_sha="$(bash .github/scripts/sync-fpf.sh)"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"

      - name: Rebuild committed memory
        run: bun run memory index

      - name: Detect sync changes
        id: detect
        shell: bash
        run: |
          if git diff --quiet --exit-code -- FPF .memory; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "message=chore(sync): mirror ailev/FPF@${{ steps.sync.outputs.upstream_sha }}" >> "$GITHUB_OUTPUT"

      - name: Commit mirrored repo and derived memory
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FPF .memory
          git commit -m "${{ steps.detect.outputs.message }}"

      - name: Push directly to current branch
        if: steps.detect.outputs.changed == 'true'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"
