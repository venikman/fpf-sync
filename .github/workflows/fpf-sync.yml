name: FPF Sync

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fpf-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream FPF repository into ./FPF
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          upstream_sha="$(bash .github/scripts/sync-fpf.sh)"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "Mirrored upstream ailev/FPF@$upstream_sha into ./FPF"

      - name: Detect sync changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          git add FPF

          if git diff --cached --quiet --exit-code -- FPF; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No sync changes detected in FPF/."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "message=chore(sync): mirror ailev/FPF@${{ steps.sync.outputs.upstream_sha }}" >> "$GITHUB_OUTPUT"

          echo "Detected changes in FPF/:"
          git diff --cached --stat -- FPF

      - name: Commit mirrored repo
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FPF
          git commit -m "${{ steps.detect.outputs.message }}"
          echo "Created commit: ${{ steps.detect.outputs.message }}"

      - name: Push directly to current branch
        if: steps.detect.outputs.changed == 'true'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"
