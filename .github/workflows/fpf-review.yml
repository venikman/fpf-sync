name: FPF Spec Review

on:
  pull_request:
    paths:
      - "FPF-Spec.md"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: fpf-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff
        id: diff
        shell: bash
        run: |
          merge_base="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
          diff_text="$(git diff "$merge_base" HEAD -- FPF-Spec.md | head -c 120000)"

          if [[ -z "$diff_text" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          printf '%s' "$diff_text" > /tmp/fpf-diff.txt

      - name: Build review prompt
        if: steps.diff.outputs.has_changes == 'true'
        shell: bash
        run: |
          prompt_template="$(cat .github/prompts/fpf-review.md)"
          diff_text="$(cat /tmp/fpf-diff.txt)"

          cat > /tmp/devin-prompt.txt <<'PROMPT_END'
          Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

          Below are:
          1. The FPF review instructions you MUST follow.
          2. The diff of changes to FPF-Spec.md.

          After analysis, post your review as a **comment on the pull request**.
          Do NOT create any branches or pull requests.

          PROMPT_END

          printf '\n---\n\n' >> /tmp/devin-prompt.txt
          printf '%s' "$prompt_template" >> /tmp/devin-prompt.txt
          printf '\n\n---\n\n## Diff\n\n```diff\n' >> /tmp/devin-prompt.txt
          cat /tmp/fpf-diff.txt >> /tmp/devin-prompt.txt
          printf '\n```\n' >> /tmp/devin-prompt.txt

      - name: Trigger Devin review session
        if: steps.diff.outputs.has_changes == 'true'
        id: devin
        shell: bash
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          if [[ -z "$DEVIN_API_KEY" ]]; then
            echo "::error::DEVIN_API_KEY secret is not set. Add it in repository Settings > Secrets."
            exit 1
          fi

          prompt="$(cat /tmp/devin-prompt.txt)"

          payload="$(jq -n \
            --arg prompt "$prompt" \
            '{ prompt: $prompt, idempotent: true }')"

          response="$(curl -sf -X POST "https://api.devin.ai/v1/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")"

          session_id="$(echo "$response" | jq -r '.session_id')"
          session_url="$(echo "$response" | jq -r '.url')"

          echo "session_id=$session_id" >> "$GITHUB_OUTPUT"
          echo "session_url=$session_url" >> "$GITHUB_OUTPUT"

          echo "::notice::Devin review session created: $session_url"

      - name: Post session link as PR comment
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- devin-fpf-review -->';
            const sessionUrl = '${{ steps.devin.outputs.session_url }}';
            const body = [
              marker,
              '## FPF Spec Review (Devin)',
              '',
              `Devin is reviewing the changes to \`FPF-Spec.md\`.`,
              '',
              `**Session:** ${sessionUrl}`,
              '',
              'Devin will post its analysis as a follow-up comment once the review is complete.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
