name: Sync GitHub FPF to PR

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  GITHUB_REPO: ailev/FPF
  SOURCE_FILE: "FPF-Spec.md"
  DEST_PATH: github
  DEST_FILENAME: "First Principles Framework — Core Conceptual Specification (holonic).md"

jobs:
  sync:
    concurrency:
      group: sync-github-fpf
      cancel-in-progress: true
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Fetch and download file from GitHub
        run: |
          set -euo pipefail

          # Input validation
          if [[ ! "$SOURCE_FILE" =~ ^[a-zA-Z0-9\ \(\)—\-\.]+$ ]]; then
            echo "::error title=Invalid Input::SOURCE_FILE contains invalid characters"
            exit 1
          fi

          if [[ ! "$GITHUB_REPO" =~ ^[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+$ ]]; then
            echo "::error title=Invalid Input::GITHUB_REPO must be in format owner/repo"
            exit 1
          fi

          # Retry helper function
          retry_git() {
            local max_attempts=3
            local timeout=2
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              if "$@"; then
                return 0
              fi
              echo "::warning title=Retry::Attempt $attempt/$max_attempts failed, retrying in ${timeout}s..."
              sleep $timeout
              attempt=$((attempt + 1))
              timeout=$((timeout * 2))
            done

            echo "::error title=Failed::All $max_attempts retry attempts exhausted"
            return 1
          }

          echo "::notice title=Clone::Cloning repository from GitHub"
          TEMP_CLONE_DIR=$(mktemp -d)
          trap 'rm -rf "$TEMP_CLONE_DIR"' EXIT

          if ! retry_git git clone --depth 1 --single-branch "https://github.com/$GITHUB_REPO.git" "$TEMP_CLONE_DIR"; then
            echo "::error title=Clone Failed::Failed to clone repository from GitHub"
            exit 1
          fi

          # Verify file exists
          SOURCE_PATH="$TEMP_CLONE_DIR/$SOURCE_FILE"
          if [ ! -f "$SOURCE_PATH" ]; then
            echo "::error title=File Not Found::Source file not found: $SOURCE_FILE"
            echo "::error::Available files in repository:"
            ls -la "$TEMP_CLONE_DIR"
            exit 1
          fi

          # Get file metadata
          FILE_SIZE=$(stat -c%s "$SOURCE_PATH" 2>/dev/null || stat -f%z "$SOURCE_PATH")
          COMMIT_SHA=$(cd "$TEMP_CLONE_DIR" && git rev-parse HEAD)
          COMMIT_DATE=$(cd "$TEMP_CLONE_DIR" && git log -1 --format=%cI)

          echo "::notice title=File Found::Commit: $COMMIT_SHA, Size: $FILE_SIZE bytes, Date: $COMMIT_DATE"

          echo "::notice title=Copy::Copying to: $DEST_PATH/$DEST_FILENAME"
          mkdir -p "$DEST_PATH"

          if ! cp "$SOURCE_PATH" "$DEST_PATH/$DEST_FILENAME"; then
            echo "::error title=Copy Failed::Failed to copy file to destination"
            exit 1
          fi

          # Verify copy
          if [ ! -f "$DEST_PATH/$DEST_FILENAME" ]; then
            echo "::error title=Copy Failed::File was not created at destination"
            exit 1
          fi

          COPIED_SIZE=$(stat -c%s "$DEST_PATH/$DEST_FILENAME" 2>/dev/null || stat -f%z "$DEST_PATH/$DEST_FILENAME")
          if [ "$COPIED_SIZE" -eq 0 ]; then
            echo "::error title=Empty File::Copied file is empty"
            exit 1
          fi

          # Verify size matches
          if [ "$COPIED_SIZE" -ne "$FILE_SIZE" ]; then
            echo "::warning title=Size Mismatch::Copied size ($COPIED_SIZE) differs from source size ($FILE_SIZE)"
          fi

          echo "::notice title=Success::Copied $COPIED_SIZE bytes successfully (commit: $COMMIT_SHA)"

          # Store metadata for future comparison
          echo "$COMMIT_SHA" > "$DEST_PATH/.last-sync-sha"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > "$DEST_PATH/.last-sync-time"

      - name: Create Pull Request
        if: ${{ env.ACT != 'true' }}
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          commit-message: 'chore(sync): GitHub FPF update'
          title: 'Sync: GitHub FPF update'
          body: |
            Automated sync from GitHub repository.
            - Source: https://github.com/${{ env.GITHUB_REPO }}
            - File: `${{ env.SOURCE_FILE }}`
            - Main FPF document: https://github.com/${{ github.repository }}/blob/main/${{ env.DEST_PATH }}/${{ env.DEST_FILENAME }}
            - Agentic diff evaluation will run automatically in this PR.
          branch: sync/github-fpf
          delete-branch: true
          labels: |
            sync:auto-merge
            source:github
          add-paths: |
            ${{ env.DEST_PATH }}/${{ env.DEST_FILENAME }}
            ${{ env.DEST_PATH }}/.last-sync-sha
            ${{ env.DEST_PATH }}/.last-sync-time
